[pytest]
# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = .
norecursedirs = .git .venv __pycache__ *.egg-info dist build

# Asyncio configuration
asyncio_mode = auto
asyncio_default_fixture_scope = function

# Markers for test categorization
markers =
    ui: UI tests with Playwright browser automation
    api: API tests using HTTP requests
    integration: Integration tests combining UI and API
    smoke: Smoke tests for quick validation
    flaky: Flaky/unreliable tests (may retry)
    slow: Slow running tests (>5s)

# Logging configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s - %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = test_execution.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(name)s - %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Output options
console_output_style = progress

# Timeout per test (5 minutes)
timeout = 300

# Minimum Python version
minversion = 7.0

# Optional: Parallel execution
# Uncomment to enable parallel test execution with pytest-xdist
# addopts = -n auto
