[pytest]
# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = .
norecursedirs = .git .venv __pycache__ *.egg-info dist build

# Asyncio mode for pytest-asyncio
asyncio_mode = auto

# Markers
markers =
    ui: UI tests using Playwright
    api: API tests using aiohttp
    database: Database tests using psycopg2
    smoke: Smoke tests for quick validation
    flaky: Flaky/unreliable tests
    slow: Slow running tests
    asyncio: Async tests

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s - %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = test_execution.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(name)s - %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Output options
console_output_style = progress

# Timeout (5 minutes per test)
timeout = 300

# Parallel execution with pytest-xdist
# addopts = -n auto

# Allure reporting
# Report directory (CI/CD will generate HTML)
allure_report_dir = allure-results

# Allure history tracking for trend analysis
allure_history_dir = .allure-history

# Allure features for categorization
# Title and environment info are set via environment.properties

# Minimum Python version
minversion = 7.0

# Strict markers - warn if unknown marker used
strict_markers = true

# Show local variables in tracebacks
showlocals = true

# Summary info
console_output_style = progress
