kind = "web"
previewPath = "/"
title = "Get Mumm"
version = "1.0.0"
id = "artifacts/get-mumm"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19319

[services.development]
run = "pnpm --filter @workspace/get-mumm run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/get-mumm", "run", "build" ]
publicDir = "artifacts/get-mumm/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19319"
BASE_PATH = "/"
