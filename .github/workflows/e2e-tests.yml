name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "24"
  DOCKER_BUILDKIT: 1

jobs:
  e2e-tests:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements-test.txt

      - name: Install Playwright browsers
        run: |
          playwright install chromium firefox --with-deps

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci || npm install

      - name: Build backend
        run: |
          cd backend
          npm run build

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5433 -U test_user; do
            echo 'waiting for PostgreSQL...'
            sleep 1
          done

      - name: Initialize database
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5433/test_db
        run: |
          cd backend
          psql $DATABASE_URL -f migrations/001_init.sql
          psql $DATABASE_URL -f migrations/002_seed_data.sql

      - name: Start backend server
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5433/test_db
          NODE_ENV: test
          PORT: 3001
        run: |
          cd backend
          npm run start &
          sleep 5
          curl -f http://localhost:3001/health || exit 1

      - name: Run E2E tests with parallel execution
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5433/test_db
          API_URL: http://localhost:3001
          BROWSER_URL: http://localhost:3000
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            -n 4 \
            --dist loadscope \
            --timeout=300 \
            --junit-xml=test-results/junit.xml \
            --alluredir=allure-results \
            -m "not flaky"

      - name: Generate Allure report
        if: always()
        run: |
          npm install -g allure-commandline
          allure generate allure-results -o allure-report

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 30

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      - name: Upload debug artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-artifacts
          path: tests/debug/
          retention-days: 7

      - name: Parse test results for PR comment
        if: always() && github.event_name == 'pull_request'
        id: parse-results
        run: |
          if [ -f "test-results/junit.xml" ]; then
            TOTAL=$(grep -c "<testcase" test-results/junit.xml || echo "0")
            PASSED=$(grep -c 'testcase.*\(succeeded\|skipped\)' test-results/junit.xml || echo "0")
            FAILED=$(grep -c 'testcase.*failure' test-results/junit.xml || echo "0")
            
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
            echo "passed=$PASSED" >> $GITHUB_OUTPUT
            echo "failed=$FAILED" >> $GITHUB_OUTPUT
          fi

      - name: Comment PR with test results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const total = '${{ steps.parse-results.outputs.total }}' || '0';
            const passed = '${{ steps.parse-results.outputs.passed }}' || '0';
            const failed = '${{ steps.parse-results.outputs.failed }}' || '0';
            
            let comment = '## 🧪 E2E Test Results\n\n';
            comment += `| Metric | Count |\n`;
            comment += `|--------|-------|\n`;
            comment += `| Total Tests | ${total} |\n`;
            comment += `| ✅ Passed | ${passed} |\n`;
            comment += `| ❌ Failed | ${failed} |\n\n`;
            comment += `📊 [View Allure Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Cleanup Docker services
        if: always()
        run: |
          docker-compose -f tests/docker-compose.test.yml down -v || true

      - name: Set workflow status
        if: always()
        run: |
          if [ "${{ steps.parse-results.outputs.failed }}" != "0" ]; then
            exit 1
          fi
