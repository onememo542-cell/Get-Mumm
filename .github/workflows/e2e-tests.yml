name: Python E2E Tests (Pytest + Playwright)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "24"

jobs:
  e2e-tests:
    name: Run Python E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements-test.txt

      - name: Install Playwright browsers
        run: |
          playwright install chromium

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Start backend server
        env:
          ASPNETCORE_ENVIRONMENT: Development
          ASPNETCORE_URLS: http://localhost:3001
        run: |
          cd backend/GetMumm.Api
          echo "Starting backend server on port 3001..."
          dotnet run > ../backend.log 2>&1 &
          BACKEND_PID=$!
          echo "Backend PID: $BACKEND_PID"
          
          for i in {1..60}; do
            if curl -s http://localhost:3001/api/health 2>/dev/null | grep -q "Healthy\|Service is operational"; then
              echo "✓ Backend ready after $i attempts"
              break
            fi
            sleep 1
          done

      - name: Install frontend dependencies
        run: |
          cd frontend
          pnpm install

      - name: Start frontend dev server
        env:
          PORT: 3000
          VITE_API_URL: http://localhost:3001
        run: |
          cd frontend
          echo "Starting frontend dev server on port 3000..."
          npm run dev > frontend.log 2>&1 &
          FRONTEND_PID=$!
          echo "Frontend PID: $FRONTEND_PID"
          
          for i in {1..30}; do
            if curl -s http://localhost:3000 2>/dev/null | grep -q "html\|<!DOCTYPE"; then
              echo "✓ Frontend ready after $i attempts"
              break
            fi
            sleep 1
          done

      - name: Run Python E2E tests
        env:
          API_BASE_URL: http://localhost:3001
          FRONTEND_BASE_URL: http://localhost:3000
          MCP_API_KEY: test-key-12345
          BROWSER_HEADLESS: "true"
        run: |
          cd tests
          pytest . \
            -v \
            --tb=short \
            -n 4 \
            --timeout=300 \
            --junit-xml=../test-results/junit.xml \
            --alluredir=../allure-results \
            -m "not flaky"

      - name: Generate Allure report
        if: always()
        run: |
          npm install -g allure-commandline
          allure generate allure-results -o allure-report

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: test-results/
          retention-days: 30

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      - name: Set workflow status
        if: always()
        run: |
          if grep -q "failed" test-results/junit.xml 2>/dev/null; then
            exit 1
          fi
