name: Deploy to Netlify & MonsterASP

on:
  push:
    branches:
      - main
      - production
  workflow_dispatch:

env:
  NODE_VERSION: "24"

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      
      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT
      
      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      
      - name: Install frontend dependencies
        run: cd frontend && pnpm install
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          
      - name: Build and Publish backend
        run: dotnet publish backend/GetMumm.Api/GetMumm.Api.csproj -c Release -o ./backend/publish

      - name: Upload backend publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-publish
          path: ./backend/publish
      
      - name: Type check frontend
        run: cd frontend && npm run typecheck
      
      - name: Build frontend
        run: cd frontend && npm run build
      
      - name: Check frontend build output
        run: |
          if [ ! -d "frontend/dist" ]; then
            echo "Error: Frontend dist directory not found"
            exit 1
          fi
          echo "Frontend built successfully to: frontend/dist"
  
  deploy-frontend:
    needs: test-and-build
    runs-on: ubuntu-latest
    if: success()
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v2.0
        with:
          publish-dir: './frontend/dist'
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: 'Deploy from GitHub Actions'
          enable-pull-request-comment: true
          enable-commit-comment: true
          overwrites-pull-request-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 1
  
  deploy-backend:
    needs: test-and-build
    runs-on: ubuntu-latest
    if: success()
    
    steps:
      - name: Download backend publish artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-publish
          path: ./backend/publish

      - name: FTP Deploy to MonsterASP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./backend/publish/
          server-dir: /site/wwwroot/ # Adjust if MonsterASP uses a different root directory

  notify:
    needs: [test-and-build, deploy-frontend, deploy-backend]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Check deployment status
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Frontend deployed to Netlify!"
            echo "✅ Backend deployed to MonsterASP via FTP!"
          else
            echo "❌ Deployment failed. Check logs above."
            exit 1
          fi
