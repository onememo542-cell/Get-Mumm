# Netlify Configuration for Frontend Deployment

[build]
  # Base directory - Netlify will be in this directory during build
  base = "frontend"
  
  # Build command (no need to cd frontend, already there)
  command = "pnpm install && pnpm build"
  
  # Publish directory where Vite outputs production build
  publish = "dist"
  
  # Node version to use - MUST be 20.19+ or 22.12+ for Vite 8
  node_version = "20.19.0"

[build.environment]
  # Environment variables for build time
  NODE_ENV = "production"
  # API URL must be set in Netlify UI or use default
  VITE_API_URL = "https://get-mumm.vercel.app"
  # Supabase variables must be set in Netlify UI
  VITE_SUPABASE_URL = "$VITE_SUPABASE_URL"
  VITE_SUPABASE_ANON_KEY = "$VITE_SUPABASE_ANON_KEY"
  BASE_PATH = "/"
  # Disable service worker by default to avoid message port errors
  VITE_ENABLE_SW = "false"

# Note: API calls go directly to Vercel backend via VITE_API_URL
# No redirect needed - frontend calls backend directly

# SPA (Single Page App) routing - redirect 404s to index.html for Wouter routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache control for static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# No cache for HTML
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
