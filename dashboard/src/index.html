<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Get Mumm — Admin Dashboard</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Admin panel for Get Mumm — Egyptian homemade meal delivery platform">
  <meta name="theme-color" content="#c44e22">

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="GM Admin">

  <!-- Favicon — same brand SVG as the customer app -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/favicon.svg">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <app-root>
    <style>
      #initial-loader {
        position: fixed;
        inset: 0;
        background: #f9fafb;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      @media (prefers-color-scheme: dark) {
        #initial-loader { background: #030712; }
      }
      #initial-loader img {
        width: 72px;
        height: 72px;
        animation: gm-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      @keyframes gm-pulse {
        0%, 100% { transform: scale(1);    opacity: 1;   }
        50%       { transform: scale(1.06); opacity: 0.8; }
      }
      #initial-loader .gm-spinner {
        margin-top: 22px;
        width: 28px;
        height: 28px;
        border: 2.5px solid rgba(196, 78, 34, 0.18);
        border-top-color: #c44e22;
        border-radius: 50%;
        animation: gm-spin 0.9s linear infinite;
      }
      @keyframes gm-spin {
        to { transform: rotate(360deg); }
      }
      #initial-loader .gm-label {
        margin-top: 14px;
        font-family: Inter, system-ui, sans-serif;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #9ca3af;
      }
    </style>
    <div id="initial-loader" role="status" aria-label="Loading Get Mumm Admin">
      <img src="/favicon.svg" alt="Get Mumm">
      <div class="gm-spinner"></div>
      <span class="gm-label">Get Mumm</span>
    </div>
  </app-root>

  <noscript>
    <div style="font-family:system-ui,sans-serif;text-align:center;padding:4rem;color:#374151">
      Please enable JavaScript to use the Get Mumm Admin Dashboard.
    </div>
  </noscript>
</body>
</html>
